<!DOCTYPE html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Cafe Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Café Celestia ☕</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#menu">Menu</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home" class="hero">
    <h2>Welcome to Your Cozy Escape</h2>
    <p>Where coffee meets calm aesthetics</p>
    <button onclick="scrollToSection('menu')">Explore Menu</button>
  </section>

  <section id="menu" class="menu">
    <h2>Our Specials</h2>
    <div class="cards">
      <div class="card">
        <h3>Latte</h3>
        <p>Rich and creamy</p>
      </div>
      <div class="card">
        <h3>Cappuccino</h3>
        <p>Perfect balance</p>
      </div>
      <div class="card">
        <h3>Mocha</h3>
        <p>Chocolate delight</p>
      </div>
    </div>
  </section>

  <section id="about" class="about">
    <h2>About Us</h2>
    <p>We create aesthetic vibes with every cup ☕✨</p>
  </section>

  <section id="contact" class="contact">
    <h2>Contact</h2>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Message"></textarea>
    <button onclick="sendMessage()">Send</button>
  </section>

  <footer>
    <p>© 2026 Café Celestia</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
